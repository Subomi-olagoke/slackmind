display_information:
  name: SlackMind
  description: A Slack agent with real long-term memory and real-time workspace grounding
  background_color: "#1a1035"

features:
  bot_user:
    display_name: SlackMind
    always_online: true
  slash_commands:
    - command: /memory-audit
      description: Show a Block Kit summary of what SlackMind remembers about you
      usage_hint: "[optional memory id to filter]"
      should_escape: false
    - command: /memory-forget
      description: Find and forget a stored memory matching a keyword
      usage_hint: "<keyword>"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read      # see @-mentions
      - chat:write             # post replies
      - commands               # register/receive the /memory-audit slash command
      - im:history             # read DM history (message.im events)
      - im:read                # see DM channel metadata
      - im:write               # open/send DMs
      # Real-Time Search (assistant.search.context) — bot-token path. Only the
      # scopes below apply to a bot token; search:read.private/.im are
      # user-token-only per Slack's docs, so they're intentionally NOT here.
      - search:read.public     # Real-Time Search — public channels (minimum required)
      - search:read.users      # Real-Time Search — bot-token minimum also needs this
      - search:read.files      # Real-Time Search — bot-token minimum also needs this
      # History fallback (any plan, when Slack AI search is unavailable):
      # read recent messages across the channels the bot is in, and resolve
      # channel/author names + permalinks for the surfaced hits.
      - channels:history       # read recent messages in public channels the bot is in
      - groups:history         # read recent messages in private channels the bot is in
      - channels:read          # list public channels + membership/names
      - groups:read            # list private channels + membership/names
      - users:read             # resolve author display names for surfaced hits

settings:
  event_subscriptions:
    bot_events:
      - app_mention           # @-mentions in channels
      - message.im            # DMs (Bolt handler filters channel_type == "im")
  interactivity:
    is_enabled: true
  socket_mode_enabled: true    # no request_url needed — events arrive over the websocket
  org_deploy_enabled: false
  token_rotation_enabled: false
